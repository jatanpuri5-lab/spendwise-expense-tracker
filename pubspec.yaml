name: expense_tracker
description: A premium fintech-style expense tracker app with beautiful UI.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Charts
  fl_chart: ^0.68.0

  # Fonts (loaded from CDN at runtime)
  google_fonts: ^6.2.1

  # Animations
  animations: ^2.0.11

  # Icons
  cupertino_icons: ^1.0.6

  # Utils
  intl: ^0.19.0
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
